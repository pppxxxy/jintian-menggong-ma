<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>今天猛攻吗？</title>
  <style>
    :root {
      color-scheme: dark;
      --bg1: #10061f;
      --bg2: #28125a;
      --card: rgba(255, 255, 255, .12);
      --card2: rgba(255, 255, 255, .18);
      --text: #fff;
      --muted: rgba(255, 255, 255, .72);
      --accent: #ff4fd8;
      --accent2: #51f5ff;
      --good: #6cff9a;
      --bad: #ff6b6b;
      --shadow: 0 24px 80px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 79, 216, .35), transparent 34%),
        radial-gradient(circle at 85% 20%, rgba(81, 245, 255, .32), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(108, 255, 154, .18), transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    .blob {
      position: fixed;
      width: 42vmax;
      height: 42vmax;
      border-radius: 50%;
      filter: blur(36px);
      opacity: .32;
      animation: float 10s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .blob.one { left: -12vmax; top: -10vmax; background: #ff4fd8; }
    .blob.two { right: -14vmax; bottom: -12vmax; background: #51f5ff; animation-delay: -4s; }

    @keyframes float {
      from { transform: translate3d(0,0,0) scale(1); }
      to { transform: translate3d(7vw, -4vh, 0) scale(1.12); }
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(92vw, 560px);
      padding: clamp(28px, 6vw, 54px);
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 34px;
      background: linear-gradient(180deg, var(--card2), var(--card));
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      text-align: center;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      color: var(--muted);
      font-size: 14px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 22px 0 10px;
      font-size: clamp(42px, 10vw, 76px);
      line-height: 1;
      letter-spacing: -0.08em;
      text-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .question {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: clamp(18px, 4vw, 24px);
    }

    .answer {
      min-height: 96px;
      display: grid;
      place-items: center;
      margin: 26px 0;
      padding: 20px;
      border-radius: 26px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.14);
      font-size: clamp(36px, 11vw, 72px);
      font-weight: 900;
      letter-spacing: .03em;
      transition: transform .2s ease, color .2s ease;
    }

    .answer.yes { color: var(--good); transform: scale(1.03) rotate(-1deg); }
    .answer.no { color: var(--bad); transform: scale(1.03) rotate(1deg); }
    .answer.wait { color: #fff; }

    button {
      appearance: none;
      border: 0;
      cursor: pointer;
      width: 100%;
      padding: 18px 22px;
      border-radius: 20px;
      color: #18051f;
      font-size: 19px;
      font-weight: 900;
      letter-spacing: .04em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 16px 40px rgba(81,245,255,.18), 0 12px 35px rgba(255,79,216,.2);
      transition: transform .16s ease, filter .16s ease;
    }
    button:hover { transform: translateY(-2px); filter: brightness(1.06); }
    button:active { transform: translateY(1px) scale(.99); }

    .note {
      margin: 18px 0 0;
      color: rgba(255,255,255,.55);
      font-size: 13px;
    }

    .shake { animation: shake .42s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake {
      10%, 90% { transform: translate3d(-1px,0,0); }
      20%, 80% { transform: translate3d(2px,0,0); }
      30%, 50%, 70% { transform: translate3d(-4px,0,0); }
      40%, 60% { transform: translate3d(4px,0,0); }
    }
  </style>
</head>
<body>
  <div class="blob one"></div>
  <div class="blob two"></div>

  <main class="card" id="card">
    <div class="tag">🔥 今日状态检测器</div>
    <h1>今天猛攻吗？</h1>
    <p class="question">点一下，让宇宙替你做决定。</p>
    <section class="answer wait" id="answer">？</section>
    <button id="btn" type="button">开始判定</button>
    <p class="note">娱乐用途：答案仅供开心，真正的猛攻靠你自己。</p>
  </main>

  <script>
    const answer = document.getElementById('answer');
    const btn = document.getElementById('btn');
    const card = document.getElementById('card');

    const results = [
      { text: '猛攻！', cls: 'yes', tip: '冲就完事了' },
      { text: '先苟住', cls: 'no', tip: '稳一点也是战略' },
      { text: '小猛一下', cls: 'yes', tip: '循序渐进也很强' },
      { text: '不猛不行', cls: 'yes', tip: '今天状态爆棚' },
      { text: '明天再说', cls: 'no', tip: '休息是为了更猛' }
    ];

    function pick() {
      btn.disabled = true;
      btn.textContent = '判定中...';
      answer.className = 'answer wait';
      answer.textContent = '...';
      card.classList.remove('shake');
      void card.offsetWidth;
      card.classList.add('shake');

      let ticks = 0;
      const timer = setInterval(() => {
        answer.textContent = Math.random() > .5 ? '猛？' : '稳？';
        ticks++;
        if (ticks >= 8) {
          clearInterval(timer);
          const r = results[Math.floor(Math.random() * results.length)];
          answer.textContent = r.text;
          answer.className = 'answer ' + r.cls;
          btn.textContent = r.tip + '，再判一次';
          btn.disabled = false;
        }
      }, 90);
    }

    btn.addEventListener('click', pick);
  </script>
</body>
</html>
